name: mandor_ui
description: "Mandor UI - A responsive Flutter web client for dispatching AI coding agents. Mobile-first design for managing tasks across all devices."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.12.0

dependencies:
  flutter:
    sdk: flutter
  
  # HTTP and networking
  http: ^1.1.0
  
  # State management and reactive programming
  riverpod: ^2.4.0
  flutter_riverpod: ^2.4.0
  
  # JSON serialization
  json_annotation: ^4.8.0
  
  # Utilities
  timeago: ^3.6.0
  intl: ^0.19.0

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0
  build_runner: ^2.4.0
  json_serializable: ^6.7.0

flutter:
  uses-material-design: true
